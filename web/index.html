<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CubeChess Viewer</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="hud">
      <h1>CubeChess Viewer</h1>
      <p>WebGL board preview (M0-M2 visual feedback)</p>
      <ul>
        <li>Drag: orbit camera</li>
        <li>Scroll / pinch: zoom</li>
        <li>Right-drag: pan</li>
      </ul>
      <div class="legend">
        <span class="dot yellow"></span> Yellow
        <span class="dot red"></span> Red
        <span class="dot purple"></span> Purple
        <span class="dot blue"></span> Blue
      </div>
    </div>
    <canvas id="app"></canvas>
    <script type="module" src="./main.js"></script>
  </body>
</html>
