<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CubeChess" />
    <meta name="theme-color" content="#0a0e27" />
    <title>CubeChess - 4-Player Voxel Strategy</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <!-- Game Canvas -->
    <canvas id="app"></canvas>

    <!-- Mobile-First Control HUD -->
    <div class="hud">
      <!-- Header -->
      <h1>🎮 CubeChess</h1>
      <p>4-Player Voxel Strategy</p>

      <!-- Player Status -->
      <div class="legend">
        <div class="legend-item">
          <span class="dot yellow"></span>
          <span>Yellow</span>
        </div>
        <div class="legend-item">
          <span class="dot red"></span>
          <span>Red</span>
        </div>
        <div class="legend-item">
          <span class="dot purple"></span>
          <span>Purple</span>
        </div>
        <div class="legend-item">
          <span class="dot blue"></span>
          <span>Blue</span>
        </div>
      </div>

      <!-- Game Status -->
      <div class="status-row">
        <span class="status-label">Turn</span>
        <span class="status-value" id="turn">Yellow</span>
      </div>

      <div class="status-row">
        <span class="status-label">Status</span>
        <span class="status-value" id="paused">Running</span>
      </div>

      <!-- Main Controls -->
      <div class="controls">
        <button id="pauseBtn" type="button">⏸ Pause</button>
        <button id="stepBtn" type="button">⏭ Step</button>
      </div>

      <div class="controls">
        <button id="resetBtn" type="button">🔄 Reset</button>
      </div>

      <!-- Settings Row -->
      <div class="controls">
        <label>
          ⚡ Speed
          <select id="speedSelect">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="2">2x</option>
            <option value="4">4x</option>
          </select>
        </label>
        <label>
          🎲 Seed
          <select id="varietySelect">
            <option value="deterministic">Deterministic</option>
            <option value="chaotic" selected>Chaotic</option>
          </select>
        </label>
      </div>

      <!-- Camera Follow -->
      <label class="follow-label">
        <input id="followToggle" type="checkbox" />
        📷 Follow active piece
      </label>

      <!-- Metrics -->
      <div class="status-row">
        <span class="status-label">AI Time</span>
        <span class="status-value" id="metrics">—</span>
      </div>

      <p class="status" id="status"></p>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
